title: GoodWe Energy                          
views:                                     
  - title: Energy                         
    path: goodwe-energy                     
    icon: mdi:solar-power                               
    badges: []                                    
    cards:                                 
      - type: vertical-stack       
        cards:                                             
          - type: heading                     
            heading: GoodWe Overview        
            icon: mdi:home-lightning-bolt-outline
                                             
          - type: gauge                  
            entity: sensor.goodwe_battery_state_of_charge
            name: Battery State of Charge
            min: 0                           
            max: 100                     
            needle: true                     
            severity:                
              green: 60                       
              yellow: 25               
              red: 0                                
                                     
          - type: entities
            title: Live Power                            
            show_header_toggle: false                 
            entities:                     
              - entity: sensor.goodwe_battery_state_of_charge
                name: Battery State of Charge
              - entity: sensor.goodwe_pv_power           
                name: PV Power           
              - entity: sensor.goodwe_pv1_power            
                name: Back Panels Power       
              - entity: sensor.goodwe_pv2_power
                name: Front Panels Power
              - entity: sensor.goodwe_house_consumption
                name: GoodWe House Consumption
              - entity: sensor.house_consumption      
                name: House Consumption (Template)
              - entity: sensor.goodwe_battery_power
                name: Battery Power        
              - entity: sensor.energy_battery_charge     
                name: Battery Charging     
              - entity: sensor.energy_battery_discharge
                name: Battery Discharging      
              - entity: sensor.goodwe_active_power_l1
                name: Grid Power (L1)
              - entity: sensor.energy_buy
                name: Grid Import         
              - entity: sensor.energy_sell    
                name: Grid Export                            
                                                             
      - type: grid                                           
        columns: 2                                     
        square: false                                    
        cards:                                         
          - type: tile                                     
            entity: sensor.pv_energy_daily             
            name: PV Today                             
            color: amber                               
          - type: tile                                 
            entity: sensor.pv_energy_monthly           
            name: PV This Month                        
            color: amber                               
          - type: tile                                 
            entity: sensor.pv1_energy_daily            
            name: Back Panels Today                      
            color: yellow                              
          - type: tile                                 
            entity: sensor.pv2_energy_daily          
            name: Front Panels Today                 
            color: yellow                   
          - type: tile                      
            entity: sensor.house_consumption_daily
            name: House Usage Today               
            color: purple                         
          - type: tile                            
            entity: sensor.house_consumption_monthly
            name: House Usage This Month                
            color: purple                           
          - type: tile                              
            entity: sensor.energy_buy_daily         
            name: Imported Today                           
            color: red                              
          - type: tile                              
            entity: sensor.energy_sell_daily        
            name: Exported Today                    
            color: green                            
          - type: tile                              
            entity: sensor.energy_battery_charge_daily
            name: Battery Charge Today                
            color: blue                               
          - type: tile                                
            entity: sensor.energy_battery_discharge_daily
            name: Battery Discharge Today                
            color: deep-orange                           
          - type: tile                                   
            entity: sensor.energy_buy_monthly            
            name: Imported This Month                    
            color: red                                   
          - type: tile                                   
            entity: sensor.energy_sell_monthly           
            name: Exported This Month                    
            color: green                                 
          - type: tile                                   
            entity: sensor.energy_battery_charge_monthly 
            name: Battery Charge This Month              
            color: blue                                  
          - type: tile                                     
            entity: sensor.energy_battery_discharge_monthly
            name: Battery Discharge This Month             
            color: deep-orange                             
          - type: tile                                     
            entity: sensor.pv1_energy_monthly              
            name: Back Panels This Month                   
            color: yellow                                  
          - type: tile                                     
            entity: sensor.pv2_energy_monthly              
            name: Front Panels This Month                  
            color: yellow                                    
                                                             
      - type: history-graph                                  
        title: Battery and Solar Trends                      
        hours_to_show: 24                                    
        refresh_interval: 60                                 
        entities:                                          
          - entity: sensor.goodwe_battery_state_of_charge  
            name: Battery %                                
          - entity: sensor.goodwe_pv_power                 
            name: PV Power                                 
          - entity: sensor.house_consumption               
            name: House Consumption                        
          - entity: sensor.energy_buy                      
            name: Grid Import                              
          - entity: sensor.energy_sell                     
            name: Grid Export                              
                                                           
      - type: history-graph                                
        title: Panel Trends                                
        hours_to_show: 24                                  
        refresh_interval: 60                               
        entities:                                          
          - entity: sensor.goodwe_pv1_power                
            name: Back Panels                              
          - entity: sensor.goodwe_pv2_power                
            name: Front Panels                             
          - entity: sensor.goodwe_battery_power            
            name: Battery Power                            
                                                           
      - type: entities                                     
        title: Daily and Monthly Totals                    
        show_header_toggle: false                          
        entities:                                          
          - type: section                                  
            label: PV Energy                               
          - entity: sensor.pv_energy_daily                 
            name: PV Today                                 
          - entity: sensor.pv_energy_monthly               
            name: PV This Month                            
          - entity: sensor.pv1_energy_daily                
            name: Back Panels Today                        
          - entity: sensor.pv1_energy_monthly              
            name: Back Panels This Month                   
          - entity: sensor.pv2_energy_daily                
            name: Front Panels Today                       
          - entity: sensor.pv2_energy_monthly              
            name: Front Panels This Month                  
          - type: section                                  
            label: Grid                                    
          - entity: sensor.energy_buy_daily                
            name: Imported Today                           
          - entity: sensor.energy_buy_monthly              
            name: Imported This Month                      
          - entity: sensor.energy_sell_daily               
            name: Exported Today                           
          - entity: sensor.energy_sell_monthly             
            name: Exported This Month                      
          - type: section                                  
            label: Battery                                 
          - entity: sensor.energy_battery_charge_daily     
            name: Battery Charge Today                     
          - entity: sensor.energy_battery_charge_monthly   
            name: Battery Charge This Month                
          - entity: sensor.energy_battery_discharge_daily  
            name: Battery Discharge Today                  
          - entity: sensor.energy_battery_discharge_monthly
            name: Battery Discharge This Month             
          - type: section                                  
            label: Consumption                             
          - entity: sensor.house_consumption_daily         
            name: House Usage Today                        
          - entity: sensor.house_consumption_monthly       
            name: House Usage This Month                   
                                                           
      - type: statistics-graph                             
        title: Daily Energy - Last 7 Days                  
        chart_type: bar                                    
        days_to_show: 7                                    
        period: day                                        
        stat_types:                                        
          - sum                                            
        entities:                                          
          - entity: sensor.pv_energy_daily                 
            name: PV                                       
          - entity: sensor.energy_buy_daily                
            name: Import                                   
          - entity: sensor.energy_sell_daily               
            name: Export                                   
          - entity: sensor.house_consumption_daily         
            name: House Use                                
                                                           
      - type: statistics-graph                             
        title: Monthly Energy - Last 6 Months              
        chart_type: line                                   
        days_to_show: 180                                  
        period: month                                      
        stat_types:                                        
          - sum                                            
        entities:                                          
          - entity: sensor.pv_energy_monthly               
            name: PV                                       
          - entity: sensor.energy_buy_monthly              
            name: Import                                   
          - entity: sensor.energy_sell_monthly             
            name: Export                                   
          - entity: sensor.house_consumption_monthly       
            name: House Use                                
                                                           
      - type: grid                                         
        columns: 3                                         
        square: false                                      
        cards:                                             
          - type: tile                                     
            entity: sensor.goodwe_pv_power                 
            name: PV Power                                 
            color: amber                                   
          - type: tile                                     
            entity: sensor.energy_buy                      
            name: Grid Import                              
            color: red                                     
          - type: tile                                     
            entity: sensor.energy_sell                     
            name: Grid Export                              
            color: green                                   
          - type: tile                                     
            entity: sensor.energy_battery_charge           
            name: Charging                                 
            color: blue                                    
          - type: tile                                     
            entity: sensor.energy_battery_discharge        
            name: Discharging                              
            color: deep-orange                             
          - type: tile                                     
            entity: sensor.house_consumption               
            name: House Use                                
            color: purple
